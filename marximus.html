<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Marximus — Physique Statement</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root{
    --paper:#F4F3EF;--card:#FBFAF7;--ink:#181A1C;--ink-2:#5A5C5A;--ink-3:#9A9B96;
    --line:#E2E0D8;--line-2:#D2CFC4;
    --gain:#1E6E4C;--gain-soft:#E7F0EA;--behind:#A6432F;
    --gold:#B8860B;--gold-soft:#FFF8E1;--streakbg:#181A1C;--streakink:#F4F3EF;--inputbg:#fff;
    --display:'Spectral',Georgia,serif;--ui:'Hanken Grotesk',system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  body.dark{
    --paper:#15161A;--card:#1C1E23;--ink:#ECEAE3;--ink-2:#9FA0A6;--ink-3:#6B6C72;
    --line:#2A2C32;--line-2:#3A3D45;
    --gain:#52B083;--gain-soft:#16281F;--behind:#C9684F;
    --gold:#D9AE4A;--gold-soft:#2A2410;--streakbg:#23262C;--streakink:#ECEAE3;--inputbg:#15161A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{background:var(--paper);color:var(--ink);font-family:var(--ui);line-height:1.45;-webkit-font-smoothing:antialiased;padding:0 0 56px;transition:background .25s,color .25s;}
  .wrap{max-width:520px;margin:0 auto;padding:0 18px;}
  .masthead{padding:26px 0 16px;border-bottom:1px solid var(--line-2);}
  .masthead-row{display:flex;justify-content:space-between;align-items:center;}
  .brand{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3);}
  .mast-right{display:flex;align-items:center;gap:12px;}
  .theme-btn{background:transparent;border:1px solid var(--line-2);color:var(--ink-2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .status{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:5px;color:var(--ink-3);}
  .status .led{width:7px;height:7px;border-radius:50%;background:var(--ink-3);}
  .status.live .led{background:var(--gain);}
  .client-name{font-family:var(--display);font-weight:500;font-size:30px;letter-spacing:-.01em;margin-top:14px;line-height:1.05;}
  .client-sub{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink-2);margin-top:5px;}
  .sec-label{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin:28px 0 12px;}
  .sec-label::after{content:"";flex:1;height:1px;background:var(--line);}
  .sec-label .edit-hint{font-size:8.5px;letter-spacing:.12em;color:var(--ink-3);opacity:.8;}
  .nav-top{display:flex;justify-content:space-between;align-items:flex-end;}
  .nav-figure{font-family:var(--display);font-weight:600;font-size:62px;line-height:.92;letter-spacing:-.02em;cursor:pointer;}
  .nav-figure .unit{font-size:22px;font-weight:400;color:var(--ink-2);margin-left:4px;}
  .nav-figure .pencil{font-size:13px;color:var(--ink-3);margin-left:8px;vertical-align:middle;}
  .nav-input{font-family:var(--display);font-weight:600;font-size:48px;width:160px;border:none;border-bottom:2px solid var(--gain);background:transparent;color:var(--ink);outline:none;}
  .nav-delta{text-align:right;font-family:var(--mono);font-size:13px;line-height:1.3;}
  .nav-delta .big{font-size:16px;font-weight:600;display:block;}
  .pos{color:var(--gain);}.neg{color:var(--behind);}.muted{color:var(--ink-3);}
  .ledger-bar{margin-top:20px;}
  .ledger-track{position:relative;height:8px;background:var(--line);border-radius:2px;}
  .ledger-fill{position:absolute;left:0;top:0;bottom:0;background:var(--gain);border-radius:2px;width:0;transition:width 1.1s cubic-bezier(.2,.7,.2,1);}
  .ledger-tick{position:absolute;top:-5px;bottom:-5px;width:2px;background:var(--ink);right:0;}
  .ledger-mile{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--gold);}
  .ledger-mile span{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--gold);}
  .ledger-ends{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);}
  .ledger-ends .goal{color:var(--ink);}
  .runrate{font-family:var(--mono);font-size:10.5px;color:var(--ink-2);margin-top:12px;text-align:center;}
  .runrate strong{color:var(--ink);}
  .tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:4px;margin:24px 0 4px;}
  .tab{flex:1;text-align:center;padding:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;border-radius:8px;cursor:pointer;color:var(--ink-3);user-select:none;}
  .tab.active{background:var(--ink);color:var(--paper);}
  .positions{border-top:1px solid var(--line);}
  .pos-row{display:grid;grid-template-columns:1fr 60px auto;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .pos-name{font-weight:600;font-size:15px;letter-spacing:-.01em;}
  .pos-name .pr{color:var(--gold);font-size:11px;margin-left:5px;}
  .pos-detail{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:2px;}
  .spark{width:60px;height:24px;display:block;}
  .pos-figs{text-align:right;}
  .pos-e1rm{font-family:var(--mono);font-size:14px;font-weight:600;}
  .pos-chg{font-family:var(--mono);font-size:11px;margin-top:2px;}
  .lift-log{grid-column:1/-1;display:flex;gap:8px;align-items:center;padding-top:10px;}
  .lift-log input{width:74px;font-family:var(--mono);font-size:13px;padding:7px 9px;border:1px solid var(--line-2);border-radius:7px;background:var(--inputbg);color:var(--ink);}
  .lift-log .x{font-family:var(--mono);color:var(--ink-3);}
  .mini-btn{font-family:var(--ui);font-weight:600;font-size:12px;padding:7px 13px;border-radius:7px;border:none;background:var(--gain);color:#fff;cursor:pointer;}
  .prog{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:12px;}
  .prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .prog-name{font-family:var(--display);font-weight:600;font-size:20px;}
  .prog-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gain);}
  .prog-desc{font-size:13.5px;color:var(--ink-2);line-height:1.55;}
  .ex-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px;gap:12px;}
  .ex-row:last-of-type{border-bottom:none;}
  .ex-name{font-weight:600;}
  .ex-scheme{font-family:var(--mono);font-size:12px;color:var(--ink-2);text-align:right;}
  .ex-scheme b{color:var(--gain);font-weight:600;}
  .prog-vids{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
  .vid{border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .vid-embed{aspect-ratio:16/9;width:100%;display:block;border:0;}
  .vid-label{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);padding:8px 12px;}
  .vid-empty{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:12px;}
  .streak{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:var(--streakbg);color:var(--streakink);border-radius:12px;margin-bottom:12px;gap:14px;}
  .streak-fig{font-family:var(--display);font-weight:600;font-size:46px;line-height:.9;}
  .streak-unit{font-family:var(--ui);font-size:13px;font-weight:500;color:#A7A99F;}
  .streak-best{font-family:var(--mono);font-size:11px;color:#A7A99F;}
  .pips{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;max-width:160px;}
  .pip{width:17px;height:17px;border-radius:50%;background:#3a3d3f;display:flex;align-items:center;justify-content:center;font-size:10px;}
  .pip.single{background:var(--gain);}
  .pip.double{background:var(--gold);color:#1c1500;}
  .weekgrid{display:flex;gap:10px;flex-wrap:wrap;}
  .session{flex:1;min-width:130px;display:flex;align-items:center;gap:11px;padding:14px 15px;background:var(--card);border:1px solid var(--line);border-radius:10px;cursor:pointer;user-select:none;}
  .dot{width:11px;height:11px;border-radius:50%;flex:none;}
  .dot.done{background:var(--gain);box-shadow:0 0 0 4px var(--gain-soft);}
  .dot.open{background:transparent;border:1.5px solid var(--line-2);}
  .dot.double-dot{background:var(--gold);box-shadow:0 0 0 4px var(--gold-soft);}
  .session-name{font-weight:600;font-size:14px;}
  .session-state{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-top:1px;}
  .fuel-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .fuel-avg{font-family:var(--mono);font-size:12px;color:var(--ink-2);}
  .fuel-avg strong{color:var(--ink);font-weight:600;}
  .meals{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;align-items:end;}
  .meal-col{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .meal-track{width:100%;max-width:28px;height:60px;background:var(--line);border-radius:4px;display:flex;flex-direction:column-reverse;overflow:hidden;}
  .meal-fill{width:100%;background:var(--gain);transition:height .4s ease;}
  .meal-fill.short{background:var(--line-2);}
  .meal-day{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);}
  .meal-n{font-family:var(--mono);font-size:10px;color:var(--ink-2);}
  .habit-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .habit-name{font-weight:600;font-size:15px;}
  .habit-stat{font-family:var(--mono);font-size:12px;color:var(--ink-2);}
  .habit-stat strong{color:var(--ink);}
  .habit-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:18px;}
  .habit-day{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .habit-box{width:100%;max-width:34px;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border:1px solid var(--line);background:var(--inputbg);}
  .habit-box.hit{background:var(--gain);color:#fff;border-color:var(--gain);}
  .habit-box.miss{color:var(--line-2);}
  .habit-dlabel{font-family:var(--mono);font-size:9px;color:var(--ink-3);}
  .habit-chart-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;}
  .grid-dots{display:flex;flex-wrap:wrap;gap:5px;}
  .gd{width:13px;height:13px;border-radius:3px;background:var(--line);}
  .gd.hit{background:var(--gain);}.gd.miss{background:var(--line-2);}
  .empty-hint{font-family:var(--mono);font-size:11px;color:var(--ink-3);}
  .coach{padding:20px;background:var(--card);border:1px solid var(--line);border-radius:12px;}
  .coach-from{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
  .coach-msg{font-family:var(--display);font-style:italic;font-size:17px;line-height:1.45;color:var(--ink);}
  .updated{text-align:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:28px;letter-spacing:.06em;}
  .panel{margin-top:26px;border:1px dashed var(--line-2);border-radius:10px;overflow:hidden;}
  .panel summary{cursor:pointer;list-style:none;padding:13px 16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);display:flex;justify-content:space-between;}
  .panel summary::-webkit-details-marker{display:none;}
  .panel[open] summary{border-bottom:1px dashed var(--line-2);}
  .panel-body{padding:14px 16px;}
  .panel-body p{font-size:12px;color:var(--ink-2);margin-bottom:10px;line-height:1.5;}
  .panel-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .btn{font-family:var(--ui);font-weight:600;font-size:12.5px;padding:9px 15px;border-radius:8px;border:none;background:var(--ink);color:var(--paper);cursor:pointer;}
  .btn.ghost{background:transparent;border:1px solid var(--line-2);color:var(--ink-2);}
  textarea{width:100%;min-height:200px;font-family:var(--mono);font-size:11px;line-height:1.5;padding:12px;border:1px solid var(--line-2);border-radius:8px;background:var(--inputbg);color:var(--ink);resize:vertical;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:12px;padding:11px 18px;border-radius:8px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}
  @media(prefers-reduced-motion:reduce){.ledger-fill,.meal-fill{transition:none;}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<div class="wrap">
<details class="panel">
  <summary><span>Coach panel</span><span>&#9662;</span></summary>
  <div class="panel-body">
    <p><strong>Tap anything to edit it.</strong> With cloud sync on, edits appear on both phones live. Otherwise they save on this device only — use <em>Copy data</em> to paste into GitHub.</p>
    <div class="panel-actions">
      <button class="btn" id="copy">Copy data for GitHub</button>
      <button class="btn ghost" id="push">Push to cloud</button>
      <button class="btn ghost" id="reset">Reset to committed</button>
    </div>
    <p>Paste a fresh JSON block (e.g. from your weekly call) and apply:</p>
    <textarea id="json-input" spellcheck="false"></textarea>
    <div class="panel-actions" style="margin-top:10px;"><button class="btn" id="apply">Apply JSON</button></div>
  </div>
</details>
</div>

<script>
/* ===========================================================================
   1) FIREBASE CONFIG
   =========================================================================== */
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyBk5f1ERJ96o-i682adFx2iYf9NPSGkVNQ",
  authDomain: "hw-coaching.firebaseapp.com",
  projectId: "hw-coaching",
  storageBucket: "hw-coaching.firebasestorage.app",
  messagingSenderId: "998540984995",
  appId: "1:998540984995:web:1aa4dc782a0a350690b516"
};
var FB_VERSION = "10.12.5";
var CLIENT_ID = new URLSearchParams(location.search).get('c') || 'marximus';

var NEW_COACH = "Start line is 60kg — 65 by spring, 70 by December. Bench stays lower weight — barbell if you're alone, DB if you aren't feeling your best. Your real opponent is week three, when the motivation dips. We build the autopilot before it shows up.";

/* ===========================================================================
   2) COMMITTED SEED DATA — never put health conditions / sensitive notes here.
   =========================================================================== */
var DATA = {
  client:{ name:"Marximus", startWeight:60.0, goalWeight:70.0, milestone:65, heightCm:175, startDate:"2026-06-23", targetDate:"2026-12-31" },
  asOf:"2026-06-28",
  streak:{ currentWeeks:0, bestWeeks:0, doubleWeeks:[] },
  coachMessage:NEW_COACH,
  nextSession:"Upper",
  bodyweight:[ { date:"2026-06-23", kg:60.0 } ],
  sessions:[
    { name:"Upper", done:false,
      description:"Push and pull for the upper body. 3 sets per exercise, ~90s rest. Add a rep each week; when you top the range clean, add load. Bench: lighter barbell when alone, DB when you're not feeling your best.",
      exercises:[
        {name:"Barbell Bench Press", scheme:"3 × 6–10"},
        {name:"Pull-ups",            scheme:"3 × AMRAP"},
        {name:"DB Overhead Press",   scheme:"3 × 8–12"},
        {name:"Lateral Raises",      scheme:"3 × 12–15"},
        {name:"Push-ups",            scheme:"3 × AMRAP"},
        {name:"Bicep Curl",          scheme:"3 × 10–12"}
      ], videos:[] },
    { name:"Lower + Abs", done:false,
      description:"Big compounds first, abs to finish. 3 sets, control the lowering phase. Abs are slow and full-range — no momentum.",
      exercises:[
        {name:"Barbell Deadlift",    scheme:"3 × 5–8"},
        {name:"Goblet Squat",        scheme:"3 × 8–12"},
        {name:"DB Lunges",           scheme:"3 × 10 / leg"},
        {name:"Hanging Leg Raises",  scheme:"3 × 10–15"},
        {name:"Russian Twists",      scheme:"3 × 20"}
      ], videos:[] }
  ],
  lifts:[
    { name:"Barbell Bench Press", session:"Upper", history:[] },
    { name:"Pull-ups",            session:"Upper", bodyweight:true, history:[ {date:"2026-06-23",reps:3} ] },
    { name:"Barbell Deadlift",    session:"Lower", history:[] },
    { name:"DB Overhead Press",   session:"Upper", history:[] },
    { name:"DB Lunges",           session:"Lower", history:[] },
    { name:"Goblet Squat",        session:"Lower", history:[] }
  ],
  nutrition:{ mealsTarget:4, week:[
    {day:"Mon",hit:4},{day:"Tue",hit:4},{day:"Wed",hit:4},{day:"Thu",hit:4},{day:"Fri",hit:4},{day:"Sat",hit:4},{day:"Sun",hit:4}
  ]},
  habit:{ name:"Train abs on wake-up", history:[] }
};

/* desired tracked lifts (order matters) */
var DESIRED_LIFTS=[
  {name:"Barbell Bench Press", session:"Upper"},
  {name:"Pull-ups",            session:"Upper", bodyweight:true},
  {name:"Barbell Deadlift",    session:"Lower"},
  {name:"DB Overhead Press",   session:"Upper"},
  {name:"DB Lunges",           session:"Lower"},
  {name:"Goblet Squat",        session:"Lower"}
];
function reshapeLifts(oldLifts){
  oldLifts=oldLifts||[];
  return DESIRED_LIFTS.map(function(d){
    var m=oldLifts.find(function(o){return o.name===d.name;});
    var lift={name:d.name, session:d.session, history:(m&&m.history)?m.history:[]};
    if(d.bodyweight) lift.bodyweight=true;
    return lift;
  });
}

/* migrate: reshape lifts, backfill session exercises/descriptions, rename habit, refresh coach default */
function migrate(s){
  if(!s.client) s.client={};
  if(!s.client.targetDate) s.client.targetDate=DATA.client.targetDate;
  s.lifts=reshapeLifts(s.lifts);
  if(Array.isArray(s.sessions)){
    s.sessions.forEach(function(ses){
      var seed=DATA.sessions.find(function(x){return x.name===ses.name;});
      if(seed){
        if(!ses.description) ses.description=seed.description;
        if(ses.videos===undefined) ses.videos=seed.videos.slice();
        if(!ses.exercises || !ses.exercises.length) ses.exercises=JSON.parse(JSON.stringify(seed.exercises));
      }
    });
  }
  if(s.habit){ if(!s.habit.name || s.habit.name==='Bed before 1am') s.habit.name=DATA.habit.name; }
  if(s.coachMessage && s.coachMessage.indexOf("dumbbell-only when you're solo")>=0) s.coachMessage=NEW_COACH;
  return s;
}

/* ---- helpers ---- */
var KEY='hw_'+CLIENT_ID+'_v3';
var state, currentTab='consistency';
function loadLocal(){
  try{ var raw=localStorage.getItem(KEY);
    if(raw){ var s=JSON.parse(raw); if(new Date(DATA.asOf)>new Date(s.asOf||0)) return structuredClone(DATA); return s; }
  }catch(e){}
  return structuredClone(DATA);
}
function saveLocal(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function today(){ return new Date().toISOString().slice(0,10); }
function e1rm(w,r){ return w*(1+r/30); }
function round1(n){ return Math.round(n*10)/10; }
function fmtDate(s){ return new Date(s).toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function monthYr(s){ return new Date(s).toLocaleDateString('en-AU',{month:'long',year:'numeric'}); }
function dow(s){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(s).getDay()]; }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1800); }

function sparkline(pts,opt){
  opt=opt||{}; var w=opt.w||60,h=opt.h||24,pad=opt.pad||3;
  if(pts.length<2)return '<svg class="spark" viewBox="0 0 '+w+' '+h+'"><line x1="'+pad+'" y1="'+(h/2)+'" x2="'+(w-pad)+'" y2="'+(h/2)+'" stroke="var(--line)" stroke-width="1.5"/></svg>';
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),sp=(mx-mn)||1,st=(w-pad*2)/(pts.length-1);
  var c=pts.map(function(v,i){return [pad+i*st,h-pad-((v-mn)/sp)*(h-pad*2)];});
  var d=c.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1);}).join(' ');
  var l=c[c.length-1];
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" fill="none"><path d="'+d+'" stroke="var(--gain)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+l[0].toFixed(1)+'" cy="'+l[1].toFixed(1)+'" r="2.2" fill="var(--gain)"/></svg>';
}

var ui={ editWeight:false, logLift:null };
function isEditing(){ return ui.editWeight||ui.logLift!==null; }
function habitCurrentWeek(){
  var map={}; state.habit.history.forEach(function(h){map[h.date]=h;}); var out=[];
  for(var i=6;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); var ds=d.toISOString().slice(0,10);
    out.push(map[ds]||{date:ds,hit:false}); }
  return out;
}
function setHabit(date,hit){
  var ex=state.habit.history.find(function(h){return h.date===date;});
  if(ex) ex.hit=hit; else state.habit.history.push({date:date,hit:hit});
  state.habit.history.sort(function(a,b){return a.date<b.date?-1:1;});
}

/* ----- builders ----- */
function buildLifts(){
  var D=state;
  return '<div class="sec-label">Lifts<span class="edit-hint">tap a row to log</span></div><div class="positions">'+
  D.lifts.map(function(l,i){
    var h=l.history, main='';
    if(h.length){
      if(l.bodyweight){
        var latest=h[h.length-1], first=h[0], chg=latest.reps-first.reps;
        var maxR=Math.max.apply(null,h.map(function(s){return s.reps;}));
        var isPR=latest.reps>=maxR;
        main='<div><div class="pos-name">'+l.name+(isPR&&h.length>1?'<span class="pr">★ PR</span>':'')+'</div><div class="pos-detail">bodyweight</div></div>'
          +sparkline(h.map(function(s){return s.reps;}))
          +'<div class="pos-figs"><div class="pos-e1rm">'+latest.reps+'<span class="muted"> reps</span></div><div class="pos-chg '+(chg>=0?'pos':'neg')+'">'+(chg>=0?'+':'')+chg+' reps</div></div>';
      } else {
        var lt=h[h.length-1], fr=h[0], eNow=e1rm(lt.weight,lt.reps), eStart=e1rm(fr.weight,fr.reps);
        var chg2=round1(eNow-eStart), chgPct=eStart?chg2/eStart*100:0;
        var maxE=Math.max.apply(null,h.map(function(s){return e1rm(s.weight,s.reps);}));
        var isPR2=eNow>=maxE;
        main='<div><div class="pos-name">'+l.name+(isPR2&&h.length>1?'<span class="pr">★ PR</span>':'')+'</div><div class="pos-detail">'+lt.weight+'kg &times; '+lt.reps+'</div></div>'
          +sparkline(h.map(function(s){return e1rm(s.weight,s.reps);}))
          +'<div class="pos-figs"><div class="pos-e1rm">'+round1(eNow)+'<span class="muted"> e1rm</span></div><div class="pos-chg '+(chg2>=0?'pos':'neg')+'">'+(chg2>=0?'+':'')+chg2+' &middot; '+(chg2>=0?'+':'')+chgPct.toFixed(0)+'%</div></div>';
      }
    } else {
      main='<div><div class="pos-name">'+l.name+'</div><div class="pos-detail muted">tap to log first set</div></div><span></span><div class="pos-figs muted" style="font-family:var(--mono);font-size:11px;">—</div>';
    }
    var logger='';
    if(ui.logLift===i){
      logger=l.bodyweight
        ? '<div class="lift-log"><input id="lr" type="number" inputmode="numeric" placeholder="reps" /><button class="mini-btn" data-act="savelift" data-i="'+i+'">Log</button></div>'
        : '<div class="lift-log"><input id="lw" type="number" inputmode="decimal" placeholder="kg" /><span class="x">&times;</span><input id="lr" type="number" inputmode="numeric" placeholder="reps" /><button class="mini-btn" data-act="savelift" data-i="'+i+'">Log</button></div>';
    }
    return '<div class="pos-row" data-act="openlift" data-i="'+i+'">'+main+logger+'</div>';
  }).join('')+'</div>';
}

function buildPrograms(){
  var D=state;
  return '<div class="sec-label">Sessions</div>'+
  D.sessions.map(function(ses){
    var isNext=(ses.name===D.nextSession);
    var exs=(ses.exercises||[]).map(function(ex){
      var tracked=D.lifts.find(function(l){return l.name===ex.name;});
      var note='';
      if(tracked && tracked.history.length){
        var last=tracked.history[tracked.history.length-1];
        note=tracked.bodyweight?('last '+last.reps+' reps'):('last '+last.weight+'kg × '+last.reps);
      }
      return '<div class="ex-row"><span class="ex-name">'+ex.name+'</span><span class="ex-scheme">'+(ex.scheme||'')+(note?' · <b>'+note+'</b>':'')+'</span></div>';
    }).join('');
    var vids=(ses.videos&&ses.videos.length)
      ? '<div class="prog-vids">'+ses.videos.map(function(v){return '<div class="vid"><iframe class="vid-embed" src="'+v.url+'" allow="fullscreen" allowfullscreen></iframe>'+(v.label?'<div class="vid-label">'+v.label+'</div>':'')+'</div>';}).join('')+'</div>'
      : '<div class="vid-empty">Exercise demos coming soon.</div>';
    return '<div class="prog"><div class="prog-head"><span class="prog-name">'+ses.name+'</span>'+(isNext?'<span class="prog-tag">Up next</span>':'')+'</div><div class="prog-desc">'+(ses.description||'')+'</div><div style="margin-top:12px;">'+exs+'</div>'+vids+'</div>';
  }).join('');
}

function buildConsistency(){
  var D=state;
  var totalWeeks=Math.max(D.streak.bestWeeks,D.streak.currentWeeks), pips='';
  for(var k=1;k<=totalWeeks;k++){ var dbl=D.streak.doubleWeeks&&D.streak.doubleWeeks.indexOf(k)>=0; pips+='<div class="pip '+(dbl?'double':'single')+'">'+(dbl?'★':'')+'</div>'; }
  var bothDone=D.sessions.every(function(s){return s.done;});
  var sessions=D.sessions.map(function(s,i){ var dc=s.done?(bothDone?'double-dot':'done'):'open';
    return '<div class="session" data-act="togglesession" data-i="'+i+'"><span class="dot '+dc+'"></span><div><div class="session-name">'+s.name+'</div><div class="session-state">'+(s.done?'Logged':'Tap to log')+'</div></div></div>'; }).join('');
  var T=D.nutrition.mealsTarget,tot=D.nutrition.week.reduce(function(a,d){return a+d.hit;},0),avg=round1(tot/D.nutrition.week.length);
  var meals=D.nutrition.week.map(function(d,i){ var ph=Math.min(1,d.hit/T)*100,short=d.hit<T;
    return '<div class="meal-col" data-act="cyclemeal" data-i="'+i+'"><div class="meal-n">'+d.hit+'</div><div class="meal-track"><div class="meal-fill'+(short?' short':'')+'" style="height:'+ph+'%"></div></div><div class="meal-day">'+d.day+'</div></div>'; }).join('');
  var H=D.habit, hist=H.history.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var hitCount=hist.filter(function(d){return d.hit;}).length, rate=hist.length?Math.round(hitCount/hist.length*100):0;
  var habitWeek=habitCurrentWeek().map(function(d){ return '<div class="habit-day" data-act="togglehabit" data-date="'+d.date+'"><div class="habit-box '+(d.hit?'hit':'miss')+'">'+(d.hit?'✓':'·')+'</div><div class="habit-dlabel">'+dow(d.date)+'</div></div>'; }).join('');
  var dots=hist.length?hist.map(function(d){return '<div class="gd '+(d.hit?'hit':'miss')+'" title="'+d.date+'"></div>';}).join(''):'<span class="empty-hint">No days logged yet — tap a square above.</span>';
  return '<div class="sec-label">Consistency</div>'
    +'<div class="streak"><div><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px;"><span class="streak-fig">'+D.streak.currentWeeks+'</span><span class="streak-unit">week streak</span></div><div class="streak-best">Best &middot; '+D.streak.bestWeeks+' &middot; ★ = both sessions</div></div><div class="pips">'+pips+'</div></div>'
    +'<div class="weekgrid">'+sessions+'</div>'
    +'<div class="sec-label">Fuel &middot; meals per day<span class="edit-hint">tap to cycle</span></div><div class="fuel-head"><span class="fuel-avg">Target <strong>'+T+'</strong>/day</span><span class="fuel-avg">Avg <strong>'+avg+'</strong>/day</span></div><div class="meals">'+meals+'</div>'
    +'<div class="sec-label">'+H.name+'<span class="edit-hint">tap a day</span></div><div class="habit-head"><span class="habit-name">'+H.name+'</span><span class="habit-stat"><strong>'+hitCount+'/'+hist.length+'</strong> days &middot; '+rate+'%</span></div><div class="habit-week">'+habitWeek+'</div><div class="habit-chart-label">All days logged</div><div class="grid-dots">'+dots+'</div>';
}

function render(){
  var D=state;
  var bw=D.bodyweight, cur=bw[bw.length-1].kg, start=D.client.startWeight, goal=D.client.goalWeight;
  var delta=round1(cur-start), pct=Math.max(0,Math.min(1,(cur-start)/(goal-start))), rem=round1(goal-cur);
  var milePct=D.client.milestone?Math.max(0,Math.min(1,(D.client.milestone-start)/(goal-start)))*100:null;
  var target=D.client.targetDate;
  var runrate='';
  if(bw.length>=2){
    var f=bw[0],l=bw[bw.length-1],days=(new Date(l.date)-new Date(f.date))/86400000;
    var perWk=days>0?((l.kg-f.kg)/days*7):0;
    if(perWk>0.02){ var wks=Math.ceil((goal-cur)/perWk); var eta=new Date(Date.now()+wks*7*86400000);
      var onPace=eta<=new Date(target);
      runrate='Run rate <strong>+'+round1(perWk)+'kg/wk</strong> &middot; projected '+monthYr(eta)+' &middot; '+(onPace?'<span class="pos">on pace</span>':'<span class="neg">behind Dec target</span>');
    } else { runrate='Scale flat — if the meals are full, they need to be bigger.'; }
  } else { runrate='Target <strong>'+goal+'kg by '+monthYr(target)+'</strong>'; }
  var consistency=currentTab==='consistency';

  document.getElementById('app').innerHTML=
    '<header class="masthead"><div class="masthead-row"><span class="brand">Howe Wu &middot; Coaching</span>'
    +'<span class="mast-right"><button class="theme-btn" id="theme" data-act="theme" title="Toggle theme">'+(document.body.classList.contains('dark')?'☀':'☾')+'</button>'
    +'<span class="status'+(cloud?' live':'')+'"><span class="led"></span><span>'+(cloud?'live sync':'on-device')+'</span></span></span></div>'
    +'<div class="client-name">'+D.client.name+'</div>'
    +'<div class="client-sub">'+D.client.heightCm+'cm &middot; Bulk &middot; '+cur.toFixed(1)+' &rarr; '+goal+'kg by '+new Date(target).toLocaleDateString('en-AU',{month:'short'})+'</div></header>'
    +'<div class="sec-label">Bodyweight<span class="edit-hint">tap to edit</span></div><div class="nav-top">'
    +(ui.editWeight?'<input class="nav-input" id="bw-input" type="number" inputmode="decimal" value="'+cur+'" />':'<div class="nav-figure" data-act="editweight">'+cur.toFixed(1)+'<span class="unit">kg</span><span class="pencil">✎</span></div>')
    +'<div class="nav-delta"><span class="big '+(delta>=0?'pos':'neg')+'">'+(delta>=0?'+':'')+delta+' kg</span><span class="muted">since start</span></div></div>'
    +'<div class="ledger-bar"><div class="ledger-track"><div class="ledger-fill" id="fill"></div>'
    +(milePct!==null?'<div class="ledger-mile" style="left:'+milePct+'%"><span>'+D.client.milestone+'</span></div>':'')
    +'<div class="ledger-tick"></div></div><div class="ledger-ends"><span>'+start+'kg</span><span class="goal">'+goal+'kg &middot; '+rem+'kg to go</span></div></div>'
    +(runrate?'<div class="runrate">'+runrate+'</div>':'')
    +'<div class="tabs"><div class="tab'+(consistency?' active':'')+'" data-act="tab" data-tab="consistency">Consistency</div><div class="tab'+(!consistency?' active':'')+'" data-act="tab" data-tab="training">Training</div></div>'
    +(consistency ? buildConsistency() : (buildLifts()+buildPrograms()))
    +'<div class="sec-label">From your coach</div><div class="coach"><div class="coach-from">Howe</div><div class="coach-msg">'+D.coachMessage+'</div></div>'
    +'<div class="updated">Last updated '+fmtDate(D.asOf)+'</div>';

  requestAnimationFrame(function(){var fl=document.getElementById('fill');if(fl)fl.style.width=(pct*100)+'%';});

  if(ui.editWeight){
    var inp=document.getElementById('bw-input'); inp.focus(); inp.select();
    var commit=function(){ var v=parseFloat(inp.value); ui.editWeight=false;
      if(!isNaN(v)&&v>0){ var t=today(); var ex=state.bodyweight.find(function(b){return b.date===t;}); if(ex)ex.kg=v; else state.bodyweight.push({date:t,kg:v}); persist(); }
      applyPendingOrRender(); };
    inp.addEventListener('blur',commit);
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter')commit(); if(e.key==='Escape'){ui.editWeight=false;applyPendingOrRender();} });
  }
  if(ui.logLift!==null){ var ff=document.getElementById(state.lifts[ui.logLift].bodyweight?'lr':'lw'); if(ff)ff.focus(); }
}

document.getElementById('app').addEventListener('click',function(e){
  var el=e.target.closest('[data-act]'); if(!el)return;
  var act=el.dataset.act, i=el.dataset.i!==undefined?parseInt(el.dataset.i):null;
  if(act==='tab'){ currentTab=el.dataset.tab; ui.logLift=null; ui.editWeight=false; render(); }
  else if(act==='theme'){ document.body.classList.toggle('dark'); try{localStorage.setItem('hw_theme',document.body.classList.contains('dark')?'dark':'light');}catch(x){} render(); }
  else if(act==='editweight'){ ui.editWeight=true; render(); }
  else if(act==='togglesession'){ state.sessions[i].done=!state.sessions[i].done; persist(); render(); }
  else if(act==='cyclemeal'){ var d=state.nutrition.week[i]; d.hit=(d.hit+1)%(state.nutrition.mealsTarget+1); persist(); render(); }
  else if(act==='togglehabit'){ var date=el.dataset.date; var c=state.habit.history.find(function(h){return h.date===date;}); setHabit(date, c?!c.hit:true); persist(); render(); }
  else if(act==='openlift'){ if(e.target.closest('.lift-log'))return; ui.logLift=(ui.logLift===i?null:i); render(); }
  else if(act==='savelift'){
    e.stopPropagation(); var l=state.lifts[i]; var r=parseInt(document.getElementById('lr').value);
    if(l.bodyweight){ if(!isNaN(r)){ l.history.push({date:today(),reps:r}); ui.logLift=null; persist(); render(); toast('Logged'); } }
    else { var w=parseFloat(document.getElementById('lw').value); if(!isNaN(w)&&!isNaN(r)){ l.history.push({date:today(),weight:w,reps:r}); ui.logLift=null; persist(); render(); toast('Logged'); } }
  }
});

/* ---- coach panel ---- */
function refreshTextarea(){ document.getElementById('json-input').value=JSON.stringify(state,null,2); }
document.getElementById('copy').addEventListener('click',function(){
  var txt='var DATA = '+JSON.stringify(state,null,2)+';';
  navigator.clipboard.writeText(txt).then(function(){toast('Copied — paste over the DATA block in GitHub');},function(){refreshTextarea();toast('Copy failed — use the text box');});
});
document.getElementById('push').addEventListener('click',function(){ if(cloud){ pushCloud(); toast('Pushed to cloud'); } else { toast('Cloud not configured'); } });
document.getElementById('reset').addEventListener('click',function(){ if(confirm('Discard edits and reset to committed data?')){ state=structuredClone(DATA); persist(); render(); refreshTextarea(); }});
document.getElementById('apply').addEventListener('click',function(){
  try{ var v=document.getElementById('json-input').value.trim().replace(/^var DATA\s*=\s*/,'').replace(/^const DATA\s*=\s*/,'').replace(/;\s*$/,''); state=migrate(JSON.parse(v)); persist(); render(); toast('Applied'); }
  catch(err){ toast('JSON error'); }
});

/* ===========================================================================
   3) DATA LAYER — render-first; Firebase loaded dynamically
   =========================================================================== */
var cloud=false, docRef=null, fb=null, pendingSnap=null, writeTimer=null;
function applyPendingOrRender(){ if(pendingSnap){ state=migrate(pendingSnap); pendingSnap=null; saveLocal(); } render(); }
function pushCloud(){ if(docRef&&fb) fb.setDoc(docRef,state).catch(function(){}); }
function persist(){ saveLocal(); if(cloud){ clearTimeout(writeTimer); writeTimer=setTimeout(pushCloud,300); } }
function initCloud(){
  if(!FIREBASE_CONFIG.apiKey) return;
  var base='https://www.gstatic.com/firebasejs/'+FB_VERSION+'/';
  Promise.all([ import(base+'firebase-app.js'), import(base+'firebase-firestore.js') ])
  .then(function(mods){
    var appMod=mods[0], fsMod=mods[1];
    var app=appMod.initializeApp(FIREBASE_CONFIG);
    var db=fsMod.getFirestore(app);
    fb=fsMod; docRef=fsMod.doc(db,'clients',CLIENT_ID);
    fsMod.onSnapshot(docRef, function(snap){
      if(snap.exists()){
        var incoming=migrate(snap.data());
        if(isEditing()){ pendingSnap=incoming; return; }
        state=incoming; saveLocal(); cloud=true; render();
      } else { fsMod.setDoc(docRef, state).catch(function(){}); }
    }, function(){ cloud=false; render(); });
    cloud=true; render();
  })
  .catch(function(){ cloud=false; });
}

/* ---- boot ---- */
try{ if(localStorage.getItem('hw_theme')==='dark') document.body.classList.add('dark'); }catch(e){}
state=migrate(loadLocal());
render();
refreshTextarea();
initCloud();
</script>
